# MemoryShield AI - Full Stack Docker Compose

version: '3.9'

services:
  # =========================================================================
  # PostgreSQL Database
  # =========================================================================
  postgres:
    image: pgvector/pgvector:pg16-latest
    container_name: memoryshield-postgres
    environment:
      POSTGRES_DB: memoryshield
      POSTGRES_USER: memoryshield
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./DATABASE_SCHEMA.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memoryshield"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - memoryshield-network

  # =========================================================================
  # Redis Cache
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: memoryshield-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - memoryshield-network
    command: redis-server --appendonly yes

  # =========================================================================
  # FastAPI Backend
  # =========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: memoryshield-backend
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://memoryshield:${DB_PASSWORD:-secure_password_change_me}@postgres:5432/memoryshield
      DATABASE_POOL_SIZE: 20

      # Redis
      REDIS_URL: redis://redis:6379/0
      CACHE_TTL: 3600

      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small

      # Anthropic (optional)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # Security
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      ALGORITHM: HS256

      # Server
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: ${DEBUG:-false}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: json

    ports:
      - "8000:8000"

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    volumes:
      - ./backend/app:/app/app
      - ./backend/logs:/app/logs

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - memoryshield-network

    command: >
      sh -c "
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # =========================================================================
  # React Frontend
  # =========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: memoryshield-frontend
    environment:
      VITE_API_URL: http://backend:8000
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - memoryshield-network
    command: npm run dev

  # =========================================================================
  # Nginx Reverse Proxy (Optional)
  # =========================================================================
  nginx:
    image: nginx:alpine
    container_name: memoryshield-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - memoryshield-network
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  memoryshield-network:
    driver: bridge

# =========================================================================
# Usage
# =========================================================================
# Development:
#   docker-compose up -d
#   Frontend: http://localhost:5173
#   Backend: http://localhost:8000
#   Postgres: localhost:5432
#   Redis: localhost:6379

# Production (with Nginx):
#   docker-compose --profile production up -d
#   Access: http://localhost (via Nginx)

# Monitoring:
#   docker-compose logs -f backend
#   docker-compose logs -f frontend
#   docker-compose logs -f postgres

# Database:
#   docker exec memoryshield-postgres psql -U memoryshield -d memoryshield
#   docker exec memoryshield-redis redis-cli

# Cleanup:
#   docker-compose down
#   docker-compose down -v  # Remove volumes
