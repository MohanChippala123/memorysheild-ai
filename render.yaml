services:
  - type: web
    name: memoryshield-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DEBUG
        value: "false"
      - key: ENVIRONMENT
        value: "production"
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: REDIS_URL
        value: ""
      - key: DATABASE_URL
        value: ""

  - type: web
    name: memoryshield-frontend
    env: node
    plan: free
    buildCommand: cd frontend && npm install --legacy-peer-deps && npm run build
    startCommand: cd frontend && npm install -g serve && serve -s dist -l $PORT
    healthCheckPath: /
    envVars:
      - key: VITE_API_URL
        value: https://memoryshield-backend.onrender.com
      - key: NODE_ENV
        value: production

databases:
  - name: memoryshield-db
    plan: free
    databaseName: memoryshield
    user: memoryshield
    region: oregon
    postgresMajorVersion: 16
