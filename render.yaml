services:
  - type: web
    name: memoryshield-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DEBUG
        value: "false"
      - key: ENVIRONMENT
        value: "production"
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    depends_on:
      - memoryshield-db
      - memoryshield-redis

  - type: web
    name: memoryshield-frontend
    env: node
    buildCommand: "cd frontend && npm install --legacy-peer-deps && npm run build"
    startCommand: "cd frontend && npm install -g serve && serve -s dist -l $PORT"
    plan: free
    envVars:
      - key: VITE_API_URL
        value: "https://memoryshield-backend.onrender.com/api/v1"
      - key: NODE_ENV
        value: "production"

  - type: pserv
    name: memoryshield-redis
    runtime: redis-7
    plan: free

databases:
  - name: memoryshield-db
    databaseName: memoryshield
    user: memoryshield
    region: oregon
    plan: free
    postgresMajorVersion: "16"
